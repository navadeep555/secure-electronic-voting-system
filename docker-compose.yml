services:

  # -------------------------------
  # PostgreSQL Database
  # -------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: voting-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voting
      POSTGRES_PASSWORD: voting123
      POSTGRES_DB: votingdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - voting-net

  # -------------------------------
  # Flask Backend
  # -------------------------------
  flask-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: voting-flask-api
    restart: unless-stopped
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - ./backend/encodings:/app/encodings
    environment:
      JWT_SECRET: change_this_secret
      DB_INTEGRITY_KEY: change_integrity_key
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: voting
      DB_PASSWORD: voting123
      DB_NAME: votingdb
      DATABASE_URL: postgresql://voting:voting123@postgres:5432/votingdb
    ports:
      - "5000:5000"
    networks:
      - voting-net

  # -------------------------------
  # Node Voting Core
  # -------------------------------
  voting-core:

    build:
      context: .
      dockerfile: voting-core/Dockerfile
    container_name: voting-core-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: voting
      DB_PASSWORD: voting123
      DB_NAME: votingdb
      DATABASE_URL: postgresql://voting:voting123@postgres:5432/votingdb
    ports:
      - "3001:3001"
    networks:
      - voting-net

  # -------------------------------
  # React Frontend
  # -------------------------------
  frontend:
    build:
      context: .
      dockerfile: src/Dockerfile
    container_name: voting-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - flask-backend
      - voting-core
    networks:
      - voting-net

  # -------------------------------
  # NGINX Reverse Proxy
  # -------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: voting-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./devops/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./devops/ssl/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - flask-backend
      - voting-core
    networks:
      - voting-net


# -------------------------------
# Network
# -------------------------------
networks:
  voting-net:
    driver: bridge


# -------------------------------
# Volumes
# -------------------------------
volumes:
  pgdata:
