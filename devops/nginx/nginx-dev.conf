# ==============================================================
# nginx-dev.conf – Development Nginx Config (HTTP only, no TLS)
# Use: docker compose -f docker-compose.dev.yml up
# ==============================================================
# WARNING: This config is for LOCAL DEVELOPMENT ONLY.
# It does NOT enforce HTTPS. Never use in production.
# ==============================================================

user  nginx;
worker_processes  1;
error_log  /var/log/nginx/error.log debug;
pid        /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format dev '$remote_addr - "$request" $status';
    access_log /var/log/nginx/access.log dev;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;
    server_tokens off;

    server {
        listen 80;
        server_name localhost;

        # ── Flask Python Backend API (/api/*) ─────────────────
        location /api/ {
            proxy_pass         http://flask-backend:5000;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 60s;
            proxy_read_timeout    120s;
        }

        # ── Node.js Voting-Core Backend (/voting-core/*) ──────
        location /voting-core/ {
            proxy_pass         http://voting-core:3001/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── React SPA (/*)  ───────────────────────────────────
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }
    }
}
