# Let's Encrypt / Certbot configuration template
# ==============================================================
# letsencrypt.ini – Production Certificate Config
# EPIC 6 US6.3 – Secure Communication
# ==============================================================
#
# USAGE (after domain DNS is configured):
#
#   # Install certbot
#   sudo apt install certbot python3-certbot-nginx
#
#   # Obtain certificate (replace domain + email with your values)
#   sudo certbot --nginx \
#     --config devops/config/letsencrypt.ini \
#     -d yourdomain.com -d www.yourdomain.com
#
#   # Auto-renewal (add to crontab):
#   0 3 * * * certbot renew --quiet --post-hook "docker compose restart nginx"
#
# ==============================================================

# Email for expiry notifications
email = admin@yourdomain.com

# Agree to Let's Encrypt Terms of Service
agree-tos = true

# No interactive prompts
non-interactive = true

# Webroot path for ACME challenge (nginx must serve /.well-known/)
# authenticator = webroot
# webroot-path = /var/www/html

# OR use standalone (requires port 80 to be free briefly):
# authenticator = standalone

# Certificate output directory
# config-dir = /etc/letsencrypt
# work-dir   = /var/lib/letsencrypt
# logs-dir   = /var/log/letsencrypt

# Domains (comma-separated)
# domains = yourdomain.com, www.yourdomain.com

# RSA key size
rsa-key-size = 4096
